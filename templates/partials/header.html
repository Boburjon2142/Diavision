<header class="site-header">
    <div class="wrapper nav-row">
        <a class="brand" href="{% url 'pages:home' %}">
            <span class="brand-mark">AI</span>
            <span>
                <strong>DiaVision AI</strong>
                <small>AI va IoT asosidagi sog‘liq platformasi</small>
            </span>
        </a>
        <nav class="desktop-nav" aria-label="Asosiy navigatsiya">
            {% for item in public_nav %}
                <a href="{{ item.url }}">{{ item.title }}</a>
            {% endfor %}
        </nav>
        <div class="header-actions">
            {% if request.user.is_authenticated %}
                <a class="btn btn-soft" href="{% url 'dashboard:overview' %}">Dashboard</a>
            {% else %}
                <a class="btn btn-soft" href="{% url 'accounts:login' %}">Kirish</a>
                <a class="btn btn-primary" href="{% url 'accounts:register' %}">Ro‘yxatdan o‘tish</a>
            {% endif %}
        </div>
    </div>
</header>
